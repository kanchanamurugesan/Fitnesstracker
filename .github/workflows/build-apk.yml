name: Build Android APK

# Builds the installable APK in the cloud (no Android SDK needed locally).
# Runs on every push to main, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web dependencies
        run: npm ci

      - name: Build the web app
        run: npm run build

      - name: Sync web build into the Android project
        run: npx cap sync android

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-tracker-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
